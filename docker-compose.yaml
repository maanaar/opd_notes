version: '3.8'

services:

  mongodb:
    image: mongo:7
    container_name: revy_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  resubmission:
    build:
      context: ./Resubmission-main
      dockerfile: Dockerfile
    container_name: revy_resubmission
    restart: unless-stopped
    ports:
      - "2200:2200"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-dev-secret-key}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=resubmission_db
    depends_on:
      - mongodb

  screening:
    build:
      context: ./Screening
      dockerfile: Dockerfile
    container_name: revy_screening
    restart: unless-stopped
    ports:
      - "2030:2030"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  submission:
    build:
      context: ./submission
      dockerfile: dockerfile
    container_name: revy_submission
    restart: unless-stopped
    ports:
      - "2300:2300"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  approval:
    build:
      context: ./approval
      dockerfile: dockerfile
    container_name: revy_approval
    restart: unless-stopped
    ports:
      - "2400:2400"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revy_portal
    restart: unless-stopped
    ports:
      - "2020:2020"
    depends_on:
      - resubmission
      - screening
      - submission
      - approval

volumes:
  mongo_data:
