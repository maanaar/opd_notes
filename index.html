<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-image: 
                linear-gradient(135deg, rgba(52, 152, 219, 0.4) 0%, rgba(46, 204, 113, 0.4) 50%, rgba(155, 89, 182, 0.4) 100%),
                url('https://images.unsplash.com/photo-1576091160550-112173f31c77?w=1200&h=800&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
        }
        .container-main {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid rgba(52, 152, 219, 0.2);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .search-section {
            margin-bottom: 30px;
        }
        .table-responsive {
            margin-top: 20px;
        }
        table thead {
            background-color: #3498db;
            color: white;
        }
        .medical-record-text {
            max-width: 300px;
            white-space: normal;
            word-wrap: break-word;
            font-size: 0.9em;
            color: #666;
        }
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .clickable-row:hover {
            background-color: rgba(52, 152, 219, 0.08);
        }
        .badge-sm {
            font-size: 0.75em;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .extracted-field {
            max-width: 250px;
            overflow-y: auto;
            max-height: 100px;
        }
        tr {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container-lg">
        <div class="container-main">
            <h1>📋 Patient Records</h1>
            
            <!-- Search Section -->
            <div class="search-section">
                <div class="row">
                    <div class="col-md-6">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="form-control form-control-lg" 
                            placeholder="🔍 Search by Patient ID or Name..."
                        >
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>Patient ID</th>
                            <th>Name</th>
                            <th>Medical Record</th>
                            <th>Allergies</th>
                            <th>Diagnoses</th>
                            <th>Medications</th>
                            <th>Procedures</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody">
                        <!-- Data will be populated by JavaScript -->
                        <tr>
                            <td colspan="7" class="text-center text-muted">Loading patient records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- No Results Message -->
            <div id="noResults" class="alert alert-warning text-center" style="display: none; margin-top: 20px;">
                No patients found matching your search.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
